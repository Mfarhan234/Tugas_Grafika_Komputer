<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pola Geometris SVG</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        svg {
            width: 90vmin;
            height: 90vmin;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            background-color: #f5efe1; /* Warna background cream */
        }
        path, rect, polygon {
            stroke: #000;
            stroke-width: 3;
            stroke-linejoin: round;
        }
    </style>
</head>
<body>

<svg viewBox="0 0 500 500">
    <!-- Background Kotak Biru Muda -->
    <rect x="75" y="75" width="350" height="350" fill="#aee1e6" />
    
    <!-- Garis Silang Utama -->
    <line x1="50" y1="250" x2="450" y2="250" stroke="black" stroke-width="3" />
    <line x1="250" y1="50" x2="250" y2="450" stroke="black" stroke-width="3" />
    <line x1="75" y1="75" x2="425" y2="425" stroke="black" stroke-width="3" />
    <line x1="425" y1="75" x2="75" y2="425" stroke="black" stroke-width="3" />

    <!-- Ornamen Sudut Luar (Hijau & Salmon) -->
    <!-- Atas Kiri -->
    <rect x="25" y="25" width="50" height="50" fill="#3fa361" />
    <rect x="0" y="0" width="25" height="25" fill="#f3816b" />
    <!-- Atas Kanan -->
    <rect x="425" y="25" width="50" height="50" fill="#3fa361" />
    <rect x="475" y="0" width="25" height="25" fill="#f3816b" />
    <!-- Bawah Kiri -->
    <rect x="25" y="425" width="50" height="50" fill="#3fa361" />
    <rect x="0" y="475" width="25" height="25" fill="#f3816b" />
    <!-- Bawah Kanan -->
    <rect x="425" y="425" width="50" height="50" fill="#3fa361" />
    <rect x="475" y="475" width="25" height="25" fill="#f3816b" />

    <!-- Struktur Tengah (Kelopak Besar) -->
    <!-- Atas -->
    <polygon points="250,50 150,150 250,150" fill="#d29ed6" /> <!-- Ungu -->
    <polygon points="250,50 350,150 250,150" fill="#f4a8b8" /> <!-- Pink -->
    <rect x="150" y="150" width="100" height="100" fill="#f7b06d" /> <!-- Orange Kiri -->
    <rect x="250" y="150" width="100" height="100" fill="#f7b06d" /> <!-- Orange Kanan -->
    
    <!-- Bawah -->
    <polygon points="250,450 150,350 250,350" fill="#f4a8b8" />
    <polygon points="250,450 350,350 250,350" fill="#d29ed6" />
    
    <!-- Kiri -->
    <polygon points="50,250 150,150 150,250" fill="#f4a8b8" />
    <polygon points="50,250 150,350 150,250" fill="#d29ed6" />
    
    <!-- Kanan -->
    <polygon points="450,250 350,150 350,250" fill="#d29ed6" />
    <polygon points="450,250 350,350 350,250" fill="#f4a8b8" />

    <!-- Bingkai Tengah Hijau -->
    <rect x="138" y="138" width="224" height="224" fill="none" stroke="#3fa361" stroke-width="12" />

    <!-- Segitiga Biru Kecil di Pinggiran Hijau -->=
    <polygon points="130,250 150,225 150,275" fill="#69b3e7" />
    <polygon points="130,200 150,175 150,225" fill="#69b3e7" />
    <polygon points="130,300 150,275 150,325" fill="#69b3e7" />
    <polygon points="370,250 350,225 350,275" fill="#69b3e7" />
    <polygon points="370,200 350,175 350,225" fill="#69b3e7" />
    <polygon points="370,300 350,275 350,325" fill="#69b3e7" />
    <polygon points="250,375 275,350 225,350" fill="#69b3e7" />
    <polygon points="200,375 225,350 175,350" fill="#69b3e7" />
    <polygon points="300,375 325,350 275,350" fill="#69b3e7" />
    <polygon points="300,125 325,150 275,150" fill="#69b3e7" />
    <polygon points="250,125 275,150 225,150" fill="#69b3e7" />
    <polygon points="200,125 225,150 175,150" fill="#69b3e7" />

    <!-- Diamond Inti -->
    <rect x="150" y="150" width="200" height="200" fill="none" stroke="black" stroke-width="2" />
    
    <!-- Pusat -->
    <rect x="200" y="200" width="100" height="100" fill="#3fa361" /> <!-- Kotak Hijau Tengah -->
    <polygon points="250,205 295,250 250,295 205,250" fill="#aee1e6" /> <!-- Diamond Biru -->
    <rect x="230" y="230" width="40" height="40" fill="#f3816b" transform="rotate(45 250 250)" /> <!-- Kotak Salmon Pusat -->

</svg>

</body>
</html>
