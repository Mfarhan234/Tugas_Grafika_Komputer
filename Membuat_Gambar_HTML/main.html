<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Refactor Pola Geometris</title>
<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background: #f0f0f0;
    }
    svg {
        width: 90vmin;
        height: 90vmin;
        background: #f5efe1;
    }
    * {
        stroke: black;
        stroke-width: 3;
        stroke-linejoin: round;
    }
</style>
</head>

<body>

<svg viewBox="0 0 500 500">

<!-- Background -->
<rect x="75" y="75" width="350" height="350" fill="#aee1e6"/>

<!-- Axis -->
<g>
    <line x1="50" y1="250" x2="450" y2="250"/>
    <line x1="250" y1="50" x2="250" y2="450"/>
    <line x1="75" y1="75" x2="425" y2="425"/>
    <line x1="425" y1="75" x2="75" y2="425"/>
</g>

<!-- Corner ornaments -->
<g>
    <g transform="translate(0,0)">
        <rect x="25" y="25" width="50" height="50" fill="#3fa361"/>
        <rect x="0" y="0" width="25" height="25" fill="#f3816b"/>
    </g>
    <g transform="translate(500,0) scale(-1,1)">
        <rect x="25" y="25" width="50" height="50" fill="#3fa361"/>
        <rect x="0" y="0" width="25" height="25" fill="#f3816b"/>
    </g>
    <g transform="translate(0,500) scale(1,-1)">
        <rect x="25" y="25" width="50" height="50" fill="#3fa361"/>
        <rect x="0" y="0" width="25" height="25" fill="#f3816b"/>
    </g>
    <g transform="translate(500,500) scale(-1,-1)">
        <rect x="25" y="25" width="50" height="50" fill="#3fa361"/>
        <rect x="0" y="0" width="25" height="25" fill="#f3816b"/>
    </g>
</g>

<!-- Main petals (gunakan rotasi) -->
<g transform="translate(250,250)">
    
    <!-- 4 sisi -->
    <g>
        <g transform="rotate(0)">
            <polygon points="0,-200 -100,-100 0,-100" fill="#d29ed6"/>
            <polygon points="0,-200 100,-100 0,-100" fill="#f4a8b8"/>
            <rect x="-100" y="-100" width="200" height="100" fill="#f7b06d"/>
        </g>

        <g transform="rotate(180)">
            <polygon points="0,-200 -100,-100 0,-100" fill="#f4a8b8"/>
            <polygon points="0,-200 100,-100 0,-100" fill="#d29ed6"/>
        </g>

        <g transform="rotate(90)">
            <polygon points="0,-200 -100,-100 0,-100" fill="#f4a8b8"/>
            <polygon points="0,-200 100,-100 0,-100" fill="#d29ed6"/>
        </g>

        <g transform="rotate(-90)">
            <polygon points="0,-200 -100,-100 0,-100" fill="#d29ed6"/>
            <polygon points="0,-200 100,-100 0,-100" fill="#f4a8b8"/>
        </g>
    </g>
</g>

<!-- Frame -->
<rect x="138" y="138" width="224" height="224"
      fill="none" stroke="#3fa361" stroke-width="12"/>

<!-- Segitiga biru (pakai rotasi) -->
<g transform="translate(250,250)">
    
    <!-- sisi kiri sebagai base -->
    <g id="triGroup">
        <polygon points="-120,0 -100,-25 -100,25" fill="#69b3e7"/>
        <polygon points="-120,-50 -100,-75 -100,-25" fill="#69b3e7"/>
        <polygon points="-120,50 -100,25 -100,75" fill="#69b3e7"/>
    </g>

    <!-- rotasi jadi 4 sisi -->
    <use href="#triGroup"/>
    <use href="#triGroup" transform="rotate(90)"/>
    <use href="#triGroup" transform="rotate(180)"/>
    <use href="#triGroup" transform="rotate(270)"/>

</g>

<!-- Diamond frame -->
<rect x="150" y="150" width="200" height="200" fill="none"/>

<!-- Center -->
<rect x="200" y="200" width="100" height="100" fill="#3fa361"/>

<polygon points="250,205 295,250 250,295 205,250"
         fill="#aee1e6"/>

<rect x="230" y="230" width="40" height="40"
      fill="#f3816b"
      transform="rotate(45 250 250)"/>

</svg>

</body>
</html>
